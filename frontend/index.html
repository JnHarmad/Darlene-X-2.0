<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darlene-X: APK Security Analysis</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🔍 Darlene-X</h1>
            <p>Browser-Based APK Security Analysis</p>
        </header>

        <main class="main-content">
            <!-- File Upload Section -->
            <section class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <h2>Upload APK File</h2>
                    <p>Drag and drop your APK file here or click to browse</p>
                    <input type="file" id="apkFile" accept=".apk" style="display: none;">
                </div>
            </section>

            <!-- Configuration Section -->
            <section class="config-section">
                <h3>Configuration</h3>
                <div class="config-group">
                    <label for="apiProvider">AI Provider:</label>
                    <select id="apiProvider">
                        <option value="openai">OpenAI (GPT-4)</option>
                        <option value="anthropic">Anthropic (Claude)</option>
                        <option value="google">Google (Gemini)</option>
                    </select>
                </div>
                <div class="config-group">
                    <label for="apiKey">API Key:</label>
                    <input type="password" id="apiKey" placeholder="Enter your API key (stored locally only)">
                </div>
                <button id="saveConfig" class="btn btn-secondary">Save Configuration</button>
            </section>

            <!-- Analysis Section -->
            <section class="analysis-section">
                <h3>Analysis Modules</h3>
                <div class="module-buttons">
                    <button id="btnManifest" class="btn btn-analysis" disabled>📋 Manifest Analysis</button>
                    <button id="btnPermissions" class="btn btn-analysis" disabled>🔐 Permissions Check</button>
                    <button id="btnAPI" class="btn btn-analysis" disabled>🔌 Suspicious APIs</button>
                    <button id="btnSignature" class="btn btn-analysis" disabled>🔑 Signature Analysis</button>
                    <button id="btnEncryption" class="btn btn-analysis" disabled>🔒 Encryption Detection</button>
                    <button id="btnMalware" class="btn btn-analysis" disabled>⚠️ Malware Detection</button>
                </div>
            </section>

            <!-- Progress Section -->
            <section class="progress-section" id="progressSection" style="display: none;">
                <h3>Analysis Progress</h3>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p id="progressText">Initializing analysis...</p>
            </section>

            <!-- Results Section -->
            <section class="results-section" id="resultsSection" style="display: none;">
                <h3>Analysis Results</h3>
                <div class="tabs">
                    <button class="tab-button active" data-tab="summary">Summary</button>
                    <button class="tab-button" data-tab="manifest">Manifest</button>
                    <button class="tab-button" data-tab="permissions">Permissions</button>
                    <button class="tab-button" data-tab="apis">APIs</button>
                    <button class="tab-button" data-tab="risks">Risk Assessment</button>
                    <button class="tab-button" data-tab="raw">Raw Data</button>
                </div>

                <div class="tab-content">
                    <div class="tab-pane active" id="summary">
                        <div id="summaryContent"></div>
                    </div>
                    <div class="tab-pane" id="manifest">
                        <pre id="manifestContent"></pre>
                    </div>
                    <div class="tab-pane" id="permissions">
                        <div id="permissionsContent"></div>
                    </div>
                    <div class="tab-pane" id="apis">
                        <div id="apisContent"></div>
                    </div>
                    <div class="tab-pane" id="risks">
                        <div id="risksContent"></div>
                    </div>
                    <div class="tab-pane" id="raw">
                        <pre id="rawContent"></pre>
                    </div>
                </div>

                <button id="btnExportReport" class="btn btn-success">📥 Export Report</button>
            </section>

            <!-- Error Section -->
            <section id="errorSection" style="display: none;" class="error-section">
                <p id="errorMessage"></p>
                <button id="btnCloseError" class="btn btn-secondary">Dismiss</button>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/modules/storage.js"></script>
    <script src="js/modules/apk-parser.js"></script>
    <script src="js/modules/manifest-analyzer.js"></script>
    <script src="js/modules/permission-analyzer.js"></script>
    <script src="js/modules/api-analyzer.js"></script>
    <script src="js/modules/signature-analyzer.js"></script>
    <script src="js/modules/encryption-detector.js"></script>
    <script src="js/modules/llm-integration.js"></script>
    <script src="js/modules/report-generator.js"></script>
    <script src="js/app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</body>
</html>
